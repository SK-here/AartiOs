# Set your personal hyprland configuration here
# See https://wiki.hypr.land/Configuring for more information

input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    touchpad {
        natural_scroll = no
    }
}

# gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
# }

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
   # no_update_news = true
}

general {
    gaps_in = 2
    
    # Syntax order: top, right, bottom, left
    gaps_out = 3, 3, 3, 3
}

# Bind Workspace 2 to the Acer display using its hardware description
workspace = 2, monitor:desc:Acer Technologies B247Y D 0x2180EEE6

# Bind Workspace 3 to your second monitor using its port name 
workspace = 3, monitor:desc:LG Electronics LG FULL HD 0x01010101

$SET_WEATHER_UNIT = "c"

