# =====================================================================
# macOS Glassmorphism Style Dunst Configuration
# Refined Version
# =====================================================================

[global]

    ### Display ###
    monitor = 0
    follow = mouse
    enable_posix_regex = true

    ### Geometry ###
    width = 360
    origin = top-right
    offset = (15, 15)
    scale = 0
    notification_limit = 10

    ### Rounded Corners ###
    corner_radius = 20

    ### Progress Bar ###
    progress_bar = true
    progress_bar_height = 6
    progress_bar_frame_width = 0
    progress_bar_min_width = 100
    progress_bar_max_width = 200
    progress_bar_corner_radius = 3

    ### Borders ###
    frame_width = 0
    gap_size = 10
    separator_height = 0

    ### Premium Spacing ###
    padding = 12
    horizontal_padding = 16
    text_icon_padding = 12

    ### Typography ###
    font = Inter 12
    line_height = 2
    markup = full
    alignment = left
    vertical_alignment = center

    ### Notification Layout ###
#    format = "<span size='125%'><b>%a</b></span>\n%s\n%b"
    format = "<b>%a</b>\n%s\n%b"
    show_age_threshold = 60
    ellipsize = end
    ignore_newline = no
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = no

    ### Icons ###
    enable_recursive_icon_lookup = true
    icon_position = left
    min_icon_size = 36
    max_icon_size = 48

    ### History & Controls ###
    sticky_history = yes
    history_length = 20
    browser = /usr/bin/xdg-open
    always_run_script = true
    title = Dunst
    class = Dunst
    ignore_dbusclose = false

    ### Mouse Bindings ###
    mouse_left_click = close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click = close_all

[experimental]
    per_monitor_dpi = true

# =====================================================================
# Theme Colors
# =====================================================================

[urgency_low]
    background = "#FFFFFFAA"
    foreground = "#111111"
    frame_color = "#FFFFFFB3"

[urgency_normal]
    background = "#FFFFFFAA"
    foreground = "#111111"
    frame_color = "#FFFFFFB3"

[urgency_critical]
    background = "#FFEBEBAA"
    foreground = "#111111"
    frame_color = "#FF3B30CC"

# =====================================================================
# Application Group Mapping
# =====================================================================

[slack]
    desktop_entry = "^Slack$"
    new_icon = slack

[telegram]
    desktop_entry = "^Telegram Desktop$"
    new_icon = telegram-desktop

[skype]
    desktop_entry = "^Skype$"
    new_icon = skype
