animations {
    enabled = true

    # Define your curves
    bezier = customBezier, 0.05, 0.9, 0.1, 1.05

    # Assign animations (NAME, ONOFF, SPEED [in 100ms units], CURVE [,STYLE])
    animation = windows, 1, 6, customBezier, slide
    animation = windowsOut, 1, 6, customBezier, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, customBezier, slidefade 20%
}

